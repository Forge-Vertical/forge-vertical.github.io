<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Terminal | Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #fafafa; }
        .vibrant-border { border: 1px solid #3f3f46; transition: border-color 0.3s; }
        .vibrant-border:focus-within { border-color: #84cc16; }
    </style>
</head>
<body class="antialiased p-6 md:p-12">

    <div id="global-nav"></div>

    <main class="max-w-4xl mx-auto py-12">
        <header class="mb-12">
            <span class="text-[#84cc16] text-[10px] font-bold uppercase tracking-[0.2em]">Project Initialization</span>
            <h1 class="text-5xl font-black tracking-tighter mt-2">Forge Your <span class="italic text-zinc-500">Vertical.</span></h1>
            <p class="text-zinc-500 mt-4 text-lg">Define the architectural DNA of your new digital asset.</p>
        </header>

        <form id="onboardForm" class="space-y-8">
            <div class="bg-zinc-900/50 p-8 rounded-[2rem] border border-zinc-800">
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400 mb-6">01. Architectural Benchmarks</h3>
                <div class="space-y-4">
                    <input type="url" name="url1" placeholder="Inspiration URL #1 (Primary Layout)" class="w-full bg-zinc-950 vibrant-border rounded-xl p-4 outline-none text-sm">
                    <input type="url" name="url2" placeholder="Inspiration URL #2 (Typography/Vibe)" class="w-full bg-zinc-950 vibrant-border rounded-xl p-4 outline-none text-sm">
                    <input type="url" name="url3" placeholder="Inspiration URL #3 (Interaction Style)" class="w-full bg-zinc-950 vibrant-border rounded-xl p-4 outline-none text-sm">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-zinc-900/50 p-8 rounded-[2rem] border border-zinc-800">
                    <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400 mb-6">02. Color Palette</h3>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-[10px] uppercase text-zinc-500 block mb-2 font-bold">Primary</label>
                            <input type="color" name="primaryColor" value="#84cc16" class="w-full h-12 bg-zinc-950 border border-zinc-800 rounded-lg cursor-pointer">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] uppercase text-zinc-500 block mb-2 font-bold">Accent</label>
                            <input type="color" name="accentColor" value="#000000" class="w-full h-12 bg-zinc-950 border border-zinc-800 rounded-lg cursor-pointer">
                        </div>
                    </div>
                </div>
                <div class="bg-zinc-900/50 p-8 rounded-[2rem] border border-zinc-800">
                    <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400 mb-6">03. Assets & Content</h3>
                    <input type="url" name="assetLink" placeholder="Link to images/logo (Drive/Dropbox)" class="w-full bg-zinc-950 vibrant-border rounded-xl p-4 outline-none text-sm mb-4">
                </div>
            </div>

            <button type="submit" class="w-full bg-[#84cc16] text-black py-6 rounded-2xl font-black uppercase tracking-[0.3em] text-xs hover:scale-[1.02] transition-transform">
                Commence Build Sequence
            </button>
        </form>
    </main>

    <div id="global-footer"></div>

    <script>
        // Form Logic
        document.getElementById('onboardForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Logic to send to your API /api/forge
            console.log("Initializing Forge with DNA:", data);
            alert("Signal Received. Check GitHub Actions logs for build status.");
        };

        // Component Loader
        async function injectGlobals() {
            try {
                const nav = await fetch('/nav.html');
                if(nav.ok) document.getElementById('global-nav').innerHTML = await nav.text();
                const foot = await fetch('/footer.html');
                if(foot.ok) document.getElementById('global-footer').innerHTML = await foot.text();
            } catch (e) {}
        }
        injectGlobals();
    </script>
</body>
</html>
