name: FORGE_SYNC_PROTOCOL
on:
  push:
    paths:
      - 'vertical-projects/**'
  workflow_dispatch:
jobs:
  sync-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.FORGE_VERTICAL_DEPLOY_KEY }}
      - run: |
          git config --global user.name "Forge-Bot"
          git config --global user.email "bot@forgevertical.com"
          git add .
          git commit -m "forge: sync sovereign nodes" || exit 0
          git push origin main
